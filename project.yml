name: Copied
options:
  bundleIdPrefix: com.mlong
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  CopiedKit:
    path: CopiedKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "7727LYTG96"
    # Hardened runtime is required both for Developer ID notarization
    # (OSS + License variants) and for Mac App Store submission.
    # Safe to leave on everywhere.
    ENABLE_HARDENED_RUNTIME: YES

targets:

  # ──────────────────────────────────────────
  # macOS App
  # ──────────────────────────────────────────
  CopiedMac:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - CopiedMac
    dependencies:
      - package: CopiedKit
    info:
      path: CopiedMac/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        LSUIElement: false
        LSApplicationCategoryType: public.app-category.utilities
        NSAppleScriptEnabled: true
        CFBundleDisplayName: Copied App
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "7"
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.mlong.copied.url-scheme
            CFBundleURLSchemes: [copied]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlong.copied.mac
        PRODUCT_NAME: Copied
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CopiedMac/CopiedMac.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "7"
        # Compile flags:
        #   MAS_BUILD       — paywall UI + PurchaseManager symbol present
        #   MAS_STOREFRONT  — "Unlock" button talks to real StoreKit (App Store IAP).
        #   LICENSE_STRIPE  — "Unlock" button opens Stripe Checkout; success returns
        #                     via copied://unlock?key=<signed-jwt>, verified offline
        #                     against a baked-in Ed25519 public key.
        # Default = MAS_BUILD + MAS_STOREFRONT (matches Xcode Run + App Store submission).
        # Each fastlane lane overrides via xcargs for its specific variant:
        #   oss_build            → SWIFT_ACTIVE_COMPILATION_CONDITIONS=''
        #   paid_license_build   → SWIFT_ACTIVE_COMPILATION_CONDITIONS='MAS_BUILD LICENSE_STRIPE'
        #   mas_build            → SWIFT_ACTIVE_COMPILATION_CONDITIONS='MAS_BUILD MAS_STOREFRONT'
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MAS_BUILD MAS_STOREFRONT
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG MAS_BUILD MAS_STOREFRONT
    entitlements:
      path: CopiedMac/CopiedMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.mlong.copied
        com.apple.developer.icloud-services:
          - CloudKit
    scheme:
      # Attach the local StoreKit config so Xcode Run simulates IAP purchases
      # without requiring the App Store Connect product to exist.
      storeKitConfiguration: Copied.storekit

  # ──────────────────────────────────────────
  # iOS App
  # ──────────────────────────────────────────
  CopiedIOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - CopiedIOS
    dependencies:
      - package: CopiedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlong.copied
        PRODUCT_NAME: Copied
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Copied
        CODE_SIGN_ENTITLEMENTS: CopiedIOS/CopiedIOS.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: CopiedIOS/CopiedIOS.entitlements
      properties:
        aps-environment: development
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.mlong.copied
        com.apple.developer.icloud-services:
          - CloudKit

  # ──────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────
  CopiedKitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - Tests/CopiedKitTests
    dependencies:
      - package: CopiedKit
      - target: CopiedMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mlong.copied.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Copied.app/Contents/MacOS/Copied"
        BUNDLE_LOADER: "$(TEST_HOST)"
