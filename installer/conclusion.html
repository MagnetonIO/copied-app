<html>
<head>
<meta charset="utf-8"/>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    padding: 20px;
    line-height: 1.6;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; opacity: 0.6; margin-bottom: 20px; }
  .steps { padding-left: 20px; }
  .steps li { padding: 6px 0; font-size: 14px; }
  .hotkey {
    display: inline-block;
    margin-top: 16px;
    padding: 8px 16px;
    border: 1px solid rgba(128,128,128,0.3);
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>
<body>
  <h1>Installation Complete</h1>
  <div class="subtitle">Copied is ready to use.</div>

  <p>Getting started:</p>
  <ol class="steps">
    <li>Look for the clipboard icon in your <strong>menu bar</strong></li>
    <li>Grant <strong>Accessibility</strong> permission when prompted</li>
    <li>Start copying &ndash; your history builds automatically</li>
  </ol>

  <div class="hotkey">Ctrl+Shift+C &ndash; Toggle Copied from anywhere</div>
</body>
</html>
