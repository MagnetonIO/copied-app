<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#000; color:#f5f5f7; font-family:var(--font-body); }

</style></head><body>
  <div class="row"><span class="spec">display-1 · 72/700</span><span class="display-1">Supercharged.</span></div>

  <div class="row"><span class="spec">h2 · 28/700</span><span class="h2">Knows your code.</span></div>
  <div class="row"><span class="spec">h3 · 20/600</span><span class="h3">Fuzzy Search</span></div>
</body></html>
