<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#000; color:#f5f5f7; font-family:var(--font-body); }
  .row { display:flex; gap:16px; align-items:center; }
  .box { width:88px; height:72px; background:#1a1a1a; border:1px solid var(--border-soft); display:flex; align-items:flex-end; justify-content:center; padding:6px; font-family:var(--font-mono); font-size:10px; color:#86868b; }
</style></head><body>
  <div class="row">
    <div class="box" style="border-radius:4px">4 · xs</div>
    <div class="box" style="border-radius:6px">6 · sm</div>
    <div class="box" style="border-radius:8px">8 · md</div>
    <div class="box" style="border-radius:12px">12 · lg</div>
    <div class="box" style="border-radius:14px">14 · xl</div>
    <div class="box" style="border-radius:16px">16 · 2xl</div>
    <div class="box" style="border-radius:22%">22% squircle</div>
    <div class="box" style="border-radius:9999px; width:72px; height:40px">pill</div>
  </div>
</body></html>
