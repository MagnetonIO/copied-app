<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#000; color:#f5f5f7; font-family:var(--font-body); display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .btn-primary { background:#fff; color:#000; font-weight:600; padding:12px 28px; border-radius:9999px; font-size:14px; border:0; display:inline-flex; align-items:center; gap:8px; }
  .btn-secondary { background:transparent; color:rgba(255,255,255,0.8); border:1px solid rgba(255,255,255,0.2); font-weight:500; padding:12px 22px; border-radius:9999px; font-size:14px; display:inline-flex; align-items:center; gap:8px; }
  .btn-ios { background:#2dd4bf; color:#00332f; font-weight:600; padding:10px 20px; border-radius:12px; font-size:14px; border:0; }
  .btn-ghost { background:transparent; color:#2dd4bf; font-weight:500; padding:8px 14px; font-size:14px; border:0; }
  .btn-danger { background:transparent; color:#ff453a; font-weight:500; padding:8px 14px; font-size:14px; border:0; }
  .tag { font-size:11px; color:#6e6e73; font-family:var(--font-mono); min-width:90px; }
</style></head><body>
  <div class="row"><span class="tag">primary</span>
    <button class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Download for Mac
    </button>
    <button class="btn-secondary">View on GitHub</button>
  </div>
  <div class="row"><span class="tag">iOS tinted</span>
    <button class="btn-ios">Done</button>
    <button class="btn-ghost">New List</button>
    <button class="btn-danger">Empty Trash</button>
  </div>
  <div class="row"><span class="tag">pill chip</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:9999px;background:rgba(52,211,153,0.1);color:#34d399;font-size:11px"><span style="width:6px;height:6px;border-radius:9999px;background:#34d399"></span>Now available for macOS</span>
    <span style="display:inline-flex;padding:4px 10px;border-radius:9999px;background:rgba(52,211,153,0.1);color:#34d399;font-size:10px">Swift</span>
  </div>
</body></html>
