<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#000; color:#f5f5f7; font-family:var(--font-body); display:flex; flex-direction:column; gap:16px; }
  .row { display:flex; align-items:center; gap:12px; }
  .tag { font-size:11px; color:#6e6e73; font-family:var(--font-mono); min-width:80px; }
  .search { flex:1; background:#1c1c1e; border:1px solid rgba(255,255,255,0.04); border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:8px; color:#6e6e73; font-size:15px; }
  .text-field { flex:1; background:#1a1a1a; border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 12px; color:#f5f5f7; }
  kbd { display:inline-block; padding:4px 10px; font-family:var(--font-mono); font-size:12px; color:#f5f5f7; background:#1a1a1a; border:1px solid rgba(255,255,255,0.1); border-radius:8px; box-shadow:0 1px 0 rgba(0,0,0,0.25); min-width:14px; text-align:center; }
  .kg { display:inline-flex; gap:4px; }
</style></head><body>
  <div class="row"><span class="tag">search</span>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Search
    </div></div>
  <div class="row"><span class="tag">text-field</span><input class="text-field" value="Meeting notes" /></div>
  <div class="row"><span class="tag">kbd</span>
    <div class="kg"><kbd>⌃</kbd><kbd>⇧</kbd><kbd>C</kbd></div>
    <span style="color:#86868b;font-size:13px">Toggle Copied</span>
    <div class="kg" style="margin-left:24px"><kbd>⌘</kbd><kbd>1–9</kbd></div>
    <span style="color:#86868b;font-size:13px">Quick paste</span>
  </div>
</body></html>
