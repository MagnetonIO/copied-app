<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#000; color:#f5f5f7; font-family:var(--font-body); }
  .list { background:#000; border:1px solid rgba(255,255,255,0.05); border-radius:12px; overflow:hidden; }
  .row { display:flex; gap:12px; padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.05); align-items:flex-start; }
  .row:last-child { border-bottom:0; }
  .ic { width:20px; height:20px; flex-shrink:0; margin-top:2px; }
  .body { flex:1; min-width:0; }
  .title { font-size:14px; line-height:1.35; }
  .meta { display:flex; gap:10px; margin-top:4px; font-size:11px; color:#6e6e73; }
  .pill { font-size:10px; padding:2px 8px; border-radius:9999px; background:rgba(52,211,153,0.1); color:#34d399; }
</style></head><body>
<div class="list">
  <div class="row">
    <svg class="ic" style="color:#34d399" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    <div class="body">
      <div class="title">func fetchClippings() async throws</div>
      <div class="meta"><span>Xcode</span><span>80 characters, 11 words</span><span>16h</span></div>
    </div>
    <span class="pill">Swift</span>
  </div>
  <div class="row">
    <svg class="ic" style="color:#60a5fa" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
    <div class="body">
      <div class="title">https://api.example.com/v2/users</div>
      <div class="meta"><span>Safari</span><span>32 characters</span><span>45s</span></div>
    </div>
  </div>
  <div class="row">
    <svg class="ic" style="color:#86868b" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <div class="body">
      <div class="title">Meeting notes from standup — discussed rollout</div>
      <div class="meta"><span>Notes</span><span>157 characters, 26 words</span><span>3m</span></div>
    </div>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="#fde047" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>
  </div>
</div>
</body></html>
