<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#000; color:#f5f5f7; font-family:var(--font-body); display:flex; gap:24px; align-items:center; }
  .icon { border-radius:22%; box-shadow:0 20px 40px -10px rgba(0,0,0,0.6); }
  .mark { width:56px; height:56px; border-radius:16px; background:var(--copied-gradient-logo); display:flex; align-items:center; justify-content:center; }
  .meta { display:flex; flex-direction:column; gap:4px; font-size:13px; color:#86868b; }
  .meta b { color:#f5f5f7; font-weight:600; }
</style></head><body>
  <img class="icon" src="../assets/app-icon-256.png" width="128" height="128" />
  <div class="meta">
    <b>App icon — macOS / iOS</b>
    <span>Glossy squircle · teal→emerald gradient · clipboard glyph</span>
    <span style="font-family:var(--font-mono);color:#6e6e73;font-size:11px">128 · 256 · 512 · 1024 px in assets/</span>
  </div>
  <div class="mark">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
      <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
      <rect x="8" y="2" width="8" height="4" rx="1"/>
    </svg>
  </div>
  <div class="meta"><b>Web logo mark</b><span>rounded-lg gradient-logo chip</span><span style="font-family:var(--font-mono);color:#6e6e73;font-size:11px">Nav · Footer</span></div>
</body></html>
