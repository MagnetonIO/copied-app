<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#000; color:#f5f5f7; font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
  .s { border-radius:12px; padding:14px; min-height:88px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--border-hair); }
  .n { font-size:11px; font-weight:500; }
  .h { font-family:var(--font-mono); font-size:10px; opacity:.7; }
</style></head><body>
<div class="grid">
  <div class="s" style="background:#000"><span class="n">bg-primary</span><span class="h">#000000</span></div>
  <div class="s" style="background:#111"><span class="n">bg-secondary</span><span class="h">#111111</span></div>
  <div class="s" style="background:#1a1a1a"><span class="n">bg-card</span><span class="h">#1a1a1a</span></div>
  <div class="s" style="background:#1f1f1f"><span class="n">bg-elevated</span><span class="h">#1f1f1f</span></div>

  <div class="s" style="background:#1a1a1a;color:#f5f5f7"><span class="n">text-primary</span><span class="h">#f5f5f7</span></div>
  <div class="s" style="background:#1a1a1a;color:#86868b"><span class="n">text-secondary</span><span class="h">#86868b</span></div>
  <div class="s" style="background:#1a1a1a;color:#6e6e73"><span class="n">text-tertiary</span><span class="h">#6e6e73</span></div>
  <div class="s" style="background:#1a1a1a;color:#3a3a3d"><span class="n">text-quaternary</span><span class="h">#3a3a3d</span></div>
</div>
</body></html>
