<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#000; color:#f5f5f7; font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; }
  .swatch { border-radius:12px; padding:14px; border:1px solid var(--border-hair); min-height:90px; display:flex; flex-direction:column; justify-content:space-between; }
  .swatch .name { font-size:11px; color:rgba(255,255,255,0.85); font-weight:500; letter-spacing:.01em; }
  .swatch .hex  { font-family:var(--font-mono); font-size:10px; opacity:.7; }
</style></head><body>
<div class="grid">
  <div class="swatch" style="background:#ecfdf5;color:#064e3b"><span class="name">teal-50</span><span class="hex">#ecfdf5</span></div>
  <div class="swatch" style="background:#d1fae5;color:#064e3b"><span class="name">teal-100</span><span class="hex">#d1fae5</span></div>
  <div class="swatch" style="background:#a7f3d0;color:#064e3b"><span class="name">teal-200</span><span class="hex">#a7f3d0</span></div>
  <div class="swatch" style="background:#6ee7b7;color:#064e3b"><span class="name">teal-300</span><span class="hex">#6ee7b7</span></div>
  <div class="swatch" style="background:#34d399;color:#064e3b"><span class="name">teal-400 · emerald</span><span class="hex">#34d399</span></div>
  <div class="swatch" style="background:#2dd4bf;color:#064e3b"><span class="name">teal-500 · iOS tint</span><span class="hex">#2dd4bf</span></div>
  <div class="swatch" style="background:#14b8a6;color:#fff"><span class="name">teal-600</span><span class="hex">#14b8a6</span></div>
  <div class="swatch" style="background:#0d9488;color:#fff"><span class="name">teal-700</span><span class="hex">#0d9488</span></div>
  <div class="swatch" style="background:#115e59;color:#fff"><span class="name">teal-800</span><span class="hex">#115e59</span></div>
  <div class="swatch" style="background:var(--copied-gradient-brand);color:#fff"><span class="name">gradient-brand</span><span class="hex">135° teal→cyan</span></div>
</div>
</body></html>
